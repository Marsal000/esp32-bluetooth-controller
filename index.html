<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#03051D">
<title>Controller V2 — Bluetooth LE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #03051D;
        --panel: #060728;
        --accent: #913BF4;
        --accent-soft: #6934F5;
    }
    
    * { 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
    }
    
    html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: #e4e0f7;
        font-family: 'Rajdhani', sans-serif;
        min-height: 100vh;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px; 
    }

    .controller-wrap {
        width: 100%;
        max-width: 1200px; 
        display: flex;
        align-items: center;
        justify-content: center;
    }

    svg {
        width: 100%;
        height: auto; 
        display: block;
        filter: drop-shadow(0 15px 35px rgba(0,0,0,0.6));
    }

    /* ==========================================
       PORTRAIT / ROTATE PROMPT
       ========================================== */
    .rotate-prompt {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 20;
        background: var(--bg);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
    }
    .rotate-prompt .phone-icon {
        width: 56px;
        height: 56px;
        color: var(--accent);
        animation: rotate-hint 1.6s ease-in-out infinite;
    }
    .rotate-prompt p {
        margin: 0;
        max-width: 260px;
        font-family: 'Orbitron', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        line-height: 1.6;
    }
    @keyframes rotate-hint {
        0%, 15% { transform: rotate(0deg); }
        50%, 65% { transform: rotate(90deg); }
        100% { transform: rotate(90deg); }
    }
    
    @media (orientation: portrait) {
        .controller-wrap { display: none; }
        .rotate-prompt { display: flex; }
    }

    /* Interactive control clusters */
    .ctrl-btn { cursor: pointer; }
    .ctrl-btn .hit { fill: transparent; }
    .ctrl-btn path { transition: fill-opacity 0.1s ease, stroke-opacity 0.1s ease, opacity 0.1s ease, stroke 0.1s ease, fill 0.1s ease; }

    /* BUTTON ACTIVE STATES */
    .ctrl-btn.active { filter: url(#pressedGlow); }
    .ctrl-btn.active .bg-wash { opacity: 0; fill-opacity: 0; }
    .ctrl-btn.active .accent-fill { opacity: 0; fill-opacity: 0; }
    .ctrl-btn.active .border-ring { 
        fill: transparent; 
        stroke-opacity: 1; 
    }
    .ctrl-btn.active .accent-stroke { stroke-opacity: 1; }
    .ctrl-btn.active .chevron-mark { fill-opacity: 1; }

    /* =========================================
       DYNAMIC CONNECTION STATUS STYLES 
       ========================================= */
    #connection-badge { 
        transition: opacity 0.4s ease; 
        cursor: pointer; /* Added cursor to show it's clickable */
    }
    #connection-badge:hover {
        filter: brightness(1.3);
    }
    #badge-bg { transition: all 0.4s ease; }
    #wifi-icon { transition: transform 0.4s ease; }
    #connection-dot-ring { transition: stroke 0.4s ease; }
    
    @keyframes flicker-on {
        0% { opacity: 0.3; filter: drop-shadow(0 0 0px #913BF4); }
        10% { opacity: 1; filter: drop-shadow(0 0 5px #913BF4); }
        20% { opacity: 0.3; filter: drop-shadow(0 0 0px #913BF4); }
        40% { opacity: 1; filter: drop-shadow(0 0 8px #913BF4); }
        50% { opacity: 0.3; }
        100% { opacity: 1; filter: drop-shadow(0 0 2px #913BF4); }
    }
    @keyframes flicker-off {
        0% { opacity: 1; filter: drop-shadow(0 0 5px #913BF4); }
        10% { opacity: 0.1; }
        20% { opacity: 1; filter: drop-shadow(0 0 5px #913BF4); }
        40% { opacity: 0.1; }
        50% { opacity: 0.6; }
        100% { opacity: 0.3; filter: drop-shadow(0 0 0px #913BF4); }
    }
    .wifi-on { animation: flicker-on 0.4s forwards; }
    .wifi-off { animation: flicker-off 0.4s forwards; }

    @keyframes pulse-alive {
        0% { filter: drop-shadow(0 0 2px #34d399); }
        50% { filter: drop-shadow(0 0 6px #34d399) drop-shadow(0 0 10px #34d399); }
        100% { filter: drop-shadow(0 0 2px #34d399); }
    }
    .dot-alive {
        fill: #34d399 !important;
        animation: pulse-alive 1.5s infinite ease-in-out;
    }
    .dot-offline {
        fill: #f43f5e !important;
        filter: drop-shadow(0 0 5px rgba(244,63,94,0.8));
    }
</style>

<script>
    // --------------------------------------------------------
    // WEB BLUETOOTH CONFIGURATION
    // --------------------------------------------------------
    
    // Standard Nordic UART Service (NUS) UUIDs
    // Very common for BLE serial communication on ESP32
    const BLE_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const BLE_RX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // Where we write data TO the ESP32

    let bluetoothDevice;
    let rxCharacteristic;

    // --------------------------------------------------------
    // HARDWARE MAPPING
    // --------------------------------------------------------
    const keyState = {
        ArrowUp: false,    // L1
        ArrowDown: false,  // L2
        ArrowLeft: false,  // L3
        ArrowRight: false  // L4
    };

    const validKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
    
    const groupFor = {
        ArrowUp: document.getElementById('ctrl-up'),
        ArrowDown: document.getElementById('ctrl-down'),
        ArrowLeft: document.getElementById('ctrl-left'),
        ArrowRight: document.getElementById('ctrl-right')
    };

    let currentConnectionState = false;

    // Tech-like Scramble Text Effect
    function scrambleText(element, targetText, targetX) {
        const chars = '01#@$%&<>?/*-+';
        let iterations = 0;
        const maxIterations = 12;
        
        element.setAttribute('x', targetX); 

        const timer = setInterval(() => {
            let scrambled = '';
            for(let i=0; i<targetText.length; i++) {
                if (iterations > maxIterations * 0.6) {
                    scrambled += targetText[i];
                } else {
                    scrambled += chars[Math.floor(Math.random() * chars.length)];
                }
            }
            element.textContent = scrambled;
            iterations++;

            if(iterations >= maxIterations) {
                clearInterval(timer);
                element.textContent = targetText;
            }
        }, 30);
    }

    function setStatus(connected) {
        if (currentConnectionState === connected) return;
        currentConnectionState = connected;

        const badge = document.getElementById('connection-badge');
        const badgeBg = document.getElementById('badge-bg');
        const text = document.getElementById('status-text');
        const wifi = document.getElementById('wifi-icon');
        const dot = document.getElementById('connection-dot');
        const dotRing = document.getElementById('connection-dot-ring');

        if (!badge || !text || !dot) return;

        if (connected) {
            badge.style.opacity = '1';
            badgeBg.setAttribute('x', '759.941');
            badgeBg.setAttribute('width', '119.293');
            wifi.style.transform = 'translate(0px, 0px)';
            
            scrambleText(text, 'CONNECTED', '825');
            
            wifi.classList.remove('wifi-off');
            wifi.classList.add('wifi-on');
            
            dot.classList.add('dot-alive');
            dot.classList.remove('dot-offline');
            dotRing.style.stroke = '#34d399';
        } else {
            badge.style.opacity = '0.7';
            badgeBg.setAttribute('x', '739.941');
            badgeBg.setAttribute('width', '139.293');
            wifi.style.transform = 'translate(-20px, 0px)';
            
            scrambleText(text, 'TAP TO CONNECT', '812');
            
            wifi.classList.remove('wifi-on');
            wifi.classList.add('wifi-off');
            
            dot.classList.remove('dot-alive');
            dot.classList.add('dot-offline');
            dotRing.style.stroke = '#f43f5e';
        }
    }

    // --- BLUETOOTH CONNECTION LOGIC ---
    async function connectBluetooth() {
        if (currentConnectionState) {
            // If already connected, do nothing or prompt disconnect
            return;
        }

        try {
            console.log('Requesting Bluetooth Device...');
            // Prompts user to select a device containing our specific service
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [BLE_SERVICE_UUID] }],
                // Alternatively, if you want to filter by name instead:
                // filters: [{ namePrefix: 'ESP32' }],
                // optionalServices: [BLE_SERVICE_UUID]
            });

            bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

            console.log('Connecting to GATT Server...');
            const server = await bluetoothDevice.gatt.connect();

            console.log('Getting Service...');
            const service = await server.getPrimaryService(BLE_SERVICE_UUID);

            console.log('Getting Characteristic...');
            rxCharacteristic = await service.getCharacteristic(BLE_RX_UUID);

            console.log('Bluetooth connected successfully!');
            setStatus(true);
            
            // Send initial stop command to make sure everything is off
            sendCommandToESP32();

        } catch (error) {
            console.error('Connection failed!', error);
            setStatus(false);
        }
    }

    function onDisconnected() {
        console.log('Bluetooth Device disconnected');
        setStatus(false);
        rxCharacteristic = null;
    }

    // Attach click event to the connection badge
    document.getElementById('connection-badge').addEventListener('click', connectBluetooth);


    // --- COMMAND SENDING ---
    async function sendCommandToESP32() {
        if (!rxCharacteristic) return; // Don't send if not connected

        const l1 = keyState.ArrowUp ? 1 : 0;
        const l2 = keyState.ArrowDown ? 1 : 0;
        const l3 = keyState.ArrowLeft ? 1 : 0;
        const l4 = keyState.ArrowRight ? 1 : 0;

        // Create a simple string format: "L1,L2,L3,L4\n"
        // Example output: "1,0,0,0\n"
        const cmdString = `${l1},${l2},${l3},${l4}\n`;
        const encoder = new TextEncoder();
        
        try {
            await rxCharacteristic.writeValue(encoder.encode(cmdString));
        } catch (err) {
            console.error("Write error:", err);
            // If write fails repeatedly, it usually means device disconnected unexpectedly
        }
    }

    function updateUI(key, isPressed) {
        if(groupFor[key]) {
            groupFor[key].classList.toggle('active', isPressed);
        }
    }

    // --- Keyboard Control ---
    window.addEventListener('keydown', (e) => {
        if (validKeys.includes(e.key)) {
            if (!keyState[e.key]) {
                keyState[e.key] = true;
                updateUI(e.key, true);
                sendCommandToESP32();
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        if (validKeys.includes(e.key)) {
            keyState[e.key] = false;
            updateUI(e.key, false);
            sendCommandToESP32();
        }
    });

    // --- Multi-touch Control ---
    validKeys.forEach(key => {
        const el = groupFor[key];
        if (!el) return;

        const press = (e) => {
            if (e && e.cancelable) e.preventDefault(); 
            if (!keyState[key]) {
                keyState[key] = true;
                updateUI(key, true);
                sendCommandToESP32();
            }
        };
        const release = (e) => {
            if (e && e.cancelable) e.preventDefault();
            if (keyState[key]) {
                keyState[key] = false;
                updateUI(key, false);
                sendCommandToESP32();
            }
        };

        el.addEventListener('touchstart', press, {passive: false});
        el.addEventListener('touchend', release, {passive: false});
        el.addEventListener('touchcancel', release, {passive: false});

        el.addEventListener('mousedown', press);
        el.addEventListener('mouseup', release);
        el.addEventListener('mouseleave', release);
    });

</script>
</body>
</html>
