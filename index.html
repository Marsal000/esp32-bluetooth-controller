<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#03051D">
<title>LED Controller — Bluetooth LE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #03051D;
        --panel: #060728;
        --accent: #913BF4;
        --accent-soft: #6934F5;
    }
    
    * { 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
    }
    
    html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: #e4e0f7;
        font-family: 'Rajdhani', sans-serif;
        min-height: 100vh;
        overflow: hidden; /* Prevents scrollbars when scaling */
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0; /* Removed padding to allow edge-to-edge fit */
        width: 100vw;
        height: 100vh;
    }

    .controller-wrap {
        width: 100%;
        height: 100%;
        max-width: 100vw; 
        display: flex;
        align-items: center;
        justify-content: center;
    }

    svg {
        width: 100%;
        height: 100%;
        max-height: 100vh;
        display: block;
        /* Removed drop-shadow to eliminate the visible rectangle border */
    }

    /* NEW: Fullscreen Button Styles */
    .fullscreen-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(6, 7, 40, 0.6);
        border: 1px solid var(--accent);
        border-radius: 8px;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent);
        cursor: pointer;
        z-index: 100;
        transition: all 0.3s ease;
    }
    .fullscreen-btn:hover {
        background: var(--accent);
        color: var(--bg);
    }
    .fullscreen-btn svg {
        width: 24px;
        height: 24px;
        filter: none;
    }

    .rotate-prompt {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 20;
        background: var(--bg);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
    }
    .rotate-prompt .phone-icon {
        width: 56px;
        height: 56px;
        color: var(--accent);
        animation: rotate-hint 1.6s ease-in-out infinite;
    }
    .rotate-prompt p {
        margin: 0;
        max-width: 260px;
        font-family: 'Orbitron', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        line-height: 1.6;
    }
    @keyframes rotate-hint {
        0%, 15% { transform: rotate(0deg); }
        50%, 65% { transform: rotate(90deg); }
        100% { transform: rotate(90deg); }
    }
    
    @media (orientation: portrait) {
        .controller-wrap { display: none; }
        .rotate-prompt { display: flex; }
    }

    .ctrl-btn { cursor: pointer; }
    .ctrl-btn .hit { fill: transparent; }
    .ctrl-btn path { transition: fill-opacity 0.1s ease, stroke-opacity 0.1s ease, opacity 0.1s ease, stroke 0.1s ease, fill 0.1s ease; }

    /* Keeps the button glowing when toggled ON */
    .ctrl-btn.active { filter: url(#pressedGlow); }
    .ctrl-btn.active .bg-wash { opacity: 0; fill-opacity: 0; }
    .ctrl-btn.active .accent-fill { opacity: 0; fill-opacity: 0; }
    .ctrl-btn.active .border-ring { fill: transparent; stroke-opacity: 1; }
    .ctrl-btn.active .accent-stroke { stroke-opacity: 1; }
    .ctrl-btn.active .chevron-mark { fill-opacity: 1; }

    #connection-badge { transition: opacity 0.4s ease; cursor: pointer; }
    #connection-badge:hover { filter: brightness(1.3); }
    #badge-bg { transition: all 0.4s ease; }
    #bluetooth-icon { transition: transform 0.4s ease; }
    #connection-dot-ring { transition: stroke 0.4s ease; }

    #battery-widget {
        transition: opacity 0.4s ease;
    }
    #battery-fill {
        transition: width 0.5s ease, fill 0.5s ease;
    }
    
    @keyframes flicker-on {
        0% { opacity: 0.3; filter: drop-shadow(0 0 0px #913BF4); }
        10% { opacity: 1; filter: drop-shadow(0 0 5px #913BF4); }
        20% { opacity: 0.3; filter: drop-shadow(0 0 0px #913BF4); }
        40% { opacity: 1; filter: drop-shadow(0 0 8px #913BF4); }
        50% { opacity: 0.3; }
        100% { opacity: 1; filter: drop-shadow(0 0 2px #913BF4); }
    }
    @keyframes flicker-off {
        0% { opacity: 1; filter: drop-shadow(0 0 5px #913BF4); }
        10% { opacity: 0.1; }
        20% { opacity: 1; filter: drop-shadow(0 0 5px #913BF4); }
        40% { opacity: 0.1; }
        50% { opacity: 0.6; }
        100% { opacity: 0.3; filter: drop-shadow(0 0 0px #913BF4); }
    }
    .bt-on { animation: flicker-on 0.4s forwards; }
    .bt-off { animation: flicker-off 0.4s forwards; }

    @keyframes pulse-alive {
        0% { filter: drop-shadow(0 0 2px #34d399); }
        50% { filter: drop-shadow(0 0 6px #34d399) drop-shadow(0 0 10px #34d399); }
        100% { filter: drop-shadow(0 0 2px #34d399); }
    }
    .dot-alive {
        fill: #34d399 !important;
        animation: pulse-alive 1.5s infinite ease-in-out;
    }
    .dot-offline {
        fill: #f43f5e !important;
        filter: drop-shadow(0 0 5px rgba(244,63,94,0.8));
    }
</style>

<script>
    // --------------------------------------------------------
    // WEB BLUETOOTH CONFIGURATION
    // --------------------------------------------------------
    const BLE_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const BLE_RX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; 
    const BLE_TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; 

    let bluetoothDevice = null;
    let rxCharacteristic = null;
    let txCharacteristic = null;
    let supportsWriteWithoutResponse = false;

    // Track TOGGLE states of the 4 LEDs. (True = ON, False = OFF)
    const ledStates = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    const validKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
    
    const groupFor = {
        ArrowUp: document.getElementById('ctrl-up'),
        ArrowDown: document.getElementById('ctrl-down'),
        ArrowLeft: document.getElementById('ctrl-left'),
        ArrowRight: document.getElementById('ctrl-right')
    };

    let currentConnectionState = false;

    // --- FULLSCREEN LOGIC ---
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable fullscreen: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    });

    document.addEventListener('fullscreenchange', () => {
        // Change icon to 'Minimize' when in fullscreen, and 'Maximize' when normal
        if (document.fullscreenElement) {
            fullscreenBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>`;
        } else {
            fullscreenBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>`;
        }
    });

    function scrambleText(element, targetText, targetX) {
        const chars = '01#@$%&<>?/*-+';
        let iterations = 0;
        const maxIterations = 12;
        element.setAttribute('x', targetX); 
        const timer = setInterval(() => {
            let scrambled = '';
            for(let i=0; i<targetText.length; i++) {
                if (iterations > maxIterations * 0.6) scrambled += targetText[i];
                else scrambled += chars[Math.floor(Math.random() * chars.length)];
            }
            element.textContent = scrambled;
            iterations++;
            if(iterations >= maxIterations) {
                clearInterval(timer);
                element.textContent = targetText;
            }
        }, 30);
    }

    function setStatus(connected) {
        if (currentConnectionState === connected) return;
        currentConnectionState = connected;

        const badge = document.getElementById('connection-badge');
        const badgeBg = document.getElementById('badge-bg');
        const text = document.getElementById('status-text');
        const btIcon = document.getElementById('bluetooth-icon');
        const dot = document.getElementById('connection-dot');
        const dotRing = document.getElementById('connection-dot-ring');
        const batteryWidget = document.getElementById('battery-widget');

        if (connected) {
            badge.style.opacity = '1';
            badgeBg.setAttribute('x', '755');
            badgeBg.setAttribute('width', '124.293');
            btIcon.style.transform = 'translate(0px, 0px)';
            scrambleText(text, 'CONNECTED', '822');
            btIcon.classList.replace('bt-off', 'bt-on');
            dot.classList.replace('dot-offline', 'dot-alive');
            dotRing.style.stroke = '#34d399';
            batteryWidget.style.opacity = '1';
        } else {
            badge.style.opacity = '0.7';
            badgeBg.setAttribute('x', '730');
            badgeBg.setAttribute('width', '149.293');
            btIcon.style.transform = 'translate(-25px, 0px)';
            scrambleText(text, 'DISCONNECTED', '812');
            btIcon.classList.replace('bt-on', 'bt-off');
            dot.classList.replace('dot-alive', 'dot-offline');
            dotRing.style.stroke = '#f43f5e';
            batteryWidget.style.opacity = '0.3';
            updateBatteryUI(0); 
        }
    }

    // --- BATTERY LOGIC ---
    function handleBatteryUpdate(event) {
        const value = event.target.value;
        const decoder = new TextDecoder('utf-8');
        const percentageStr = decoder.decode(value);
        const percentage = parseInt(percentageStr);
        updateBatteryUI(percentage);
    }

    function updateBatteryUI(percent) {
        const batteryText = document.getElementById('battery-text');
        const batteryFill = document.getElementById('battery-fill');
        
        batteryText.textContent = `${percent}%`;
        const fillWidth = (percent / 100) * 32;
        batteryFill.setAttribute('width', fillWidth);

        if (percent > 50) {
            batteryFill.setAttribute('fill', '#34d399'); 
        } else if (percent > 20) {
            batteryFill.setAttribute('fill', '#fbbf24'); 
        } else {
            batteryFill.setAttribute('fill', '#f43f5e'); 
        }
    }

    // --- BLUETOOTH CONNECTION LOGIC ---
    async function connectBluetooth() {
        if (currentConnectionState) return;

        if (bluetoothDevice && bluetoothDevice.gatt) {
            try {
                await bindToDevice(bluetoothDevice);
                return;
            } catch (err) {
                console.warn('Silent reconnect failed, falling back.', err);
            }
        }

        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [BLE_SERVICE_UUID] }]
            });
            await bindToDevice(device);
        } catch (error) {
            console.error('Connection failed!', error);
            setStatus(false);
        }
    }

    async function bindToDevice(device) {
        bluetoothDevice = device;
        bluetoothDevice.removeEventListener('gattserverdisconnected', onDisconnected);
        bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

        const server = await bluetoothDevice.gatt.connect();
        const service = await server.getPrimaryService(BLE_SERVICE_UUID);
        
        rxCharacteristic = await service.getCharacteristic(BLE_RX_UUID);
        supportsWriteWithoutResponse = typeof rxCharacteristic.writeValueWithoutResponse === 'function';

        txCharacteristic = await service.getCharacteristic(BLE_TX_UUID);
        await txCharacteristic.startNotifications();
        txCharacteristic.addEventListener('characteristicvaluechanged', handleBatteryUpdate);

        setStatus(true);
        sendCommandToESP32();
    }

    function onDisconnected() {
        setStatus(false);
        rxCharacteristic = null;
        if (txCharacteristic) {
            txCharacteristic.removeEventListener('characteristicvaluechanged', handleBatteryUpdate);
            txCharacteristic = null;
        }
    }

    document.getElementById('connection-badge').addEventListener('click', connectBluetooth);

    // --- NEW: SEND 1-BYTE LED MASK PAYLOAD ---
    async function sendCommandToESP32() {
        if (!rxCharacteristic) return;

        // Build the LED Bitmask based on which UI elements are toggled ON
        let ledByte = 0x00;
        if (ledStates.ArrowUp)    ledByte |= 1; // 00000001 (Decimal 1)
        if (ledStates.ArrowDown)  ledByte |= 2; // 00000010 (Decimal 2)
        if (ledStates.ArrowLeft)  ledByte |= 4; // 00000100 (Decimal 4)
        if (ledStates.ArrowRight) ledByte |= 8; // 00001000 (Decimal 8)

        // Create the highly optimized 1-byte array payload
        const payload = new Uint8Array([ledByte]);

        try {
            if (supportsWriteWithoutResponse) {
                await rxCharacteristic.writeValueWithoutResponse(payload);
            } else {
                await rxCharacteristic.writeValue(payload);
            }
        } catch (err) {
            console.error('Write error:', err);
        }
    }

    function updateUI(key, isPressed) {
        if(groupFor[key]) groupFor[key].classList.toggle('active', isPressed);
    }

    // --- Keyboard Control (Toggle Switch mode) ---
    window.addEventListener('keydown', async (e) => {
        // e.repeat prevents the key from rapidly strobing if you hold it down
        if (validKeys.includes(e.key) && !e.repeat) { 
            if (!currentConnectionState) return connectBluetooth();
            
            // Toggle the state (If false make it true, if true make it false)
            ledStates[e.key] = !ledStates[e.key]; 
            
            // Update the UI Glow and send the new data
            updateUI(e.key, ledStates[e.key]);
            sendCommandToESP32();
        }
    });

    // --- Touch Control (Toggle Switch mode) ---
    validKeys.forEach(key => {
        const el = groupFor[key];
        if (!el) return;

        const toggleLight = async (e) => {
            if (e && e.cancelable) e.preventDefault(); 
            if (!currentConnectionState) return connectBluetooth();
            
            ledStates[key] = !ledStates[key];
            updateUI(key, ledStates[key]);
            sendCommandToESP32();
        };

        // We only care about when you PRESS the button to toggle it
        el.addEventListener('touchstart', toggleLight, {passive: false});
        el.addEventListener('mousedown', toggleLight);
    });
</script>
